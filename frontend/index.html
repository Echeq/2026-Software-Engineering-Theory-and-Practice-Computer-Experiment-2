<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPMP | Login</title>
  <link rel="stylesheet" href="./css/login.css">
  <script src="./js/i18n.js" defer></script>
</head>
<body>
  <div class="auth-page-controls">
    <button
      id="theme-toggle-btn"
      type="button"
      class="theme-toggle"
      aria-pressed="false"
      aria-label="Switch to dark mode"
      title="Switch to dark mode"
    >
      <span class="theme-toggle-icon theme-toggle-icon-moon" aria-hidden="true">
        <svg viewBox="0 0 20 20" focusable="false">
          <path d="M15.2 12.9A6.5 6.5 0 0 1 7.1 4.8a6.7 6.7 0 1 0 8.1 8.1Z"></path>
        </svg>
      </span>
      <span class="theme-toggle-icon theme-toggle-icon-sun" aria-hidden="true">
        <svg viewBox="0 0 20 20" focusable="false">
          <circle cx="10" cy="10" r="3.2"></circle>
          <path d="M10 2.4v2.1M10 15.5v2.1M17.6 10h-2.1M4.5 10H2.4M15.4 4.6l-1.5 1.5M6.1 13.9l-1.5 1.5M15.4 15.4l-1.5-1.5M6.1 6.1 4.6 4.6"></path>
        </svg>
      </span>
    </button>
  </div>
  <main class="login-page">
    <section class="login-card" aria-labelledby="login-title">
      <span class="brand-tag">SPMP</span>
      <h1 id="login-title" data-i18n="login.title">Log In</h1>
      <p class="subtitle" data-i18n="login.subtitle">
        A platform for managing projects and tasks.
      </p>

      <form class="login-form" id="login-form" novalidate>
        <p class="form-message" id="form-message" aria-live="polite"></p>

        <div class="form-group">
          <label for="email" data-i18n="login.email">Email</label>
          <input
            id="email"
            name="email"
            type="email"
            placeholder="student@example.com"
            data-i18n-placeholder="login.emailPlaceholder"
            autocomplete="email"
          >
          <small class="field-error" data-error-for="email"></small>
        </div>

        <div class="form-group">
          <label for="password" data-i18n="login.password">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            placeholder="Enter your password"
            data-i18n-placeholder="login.passwordPlaceholder"
            autocomplete="current-password"
          >
          <small class="field-error" data-error-for="password"></small>
        </div>

        <button type="submit" class="submit-button" data-i18n="login.submit">Log In</button>
      </form>

      <p class="auth-switch">
        <span data-i18n="login.noAccount">Don't have an account?</span>
        <a href="./signup.html" class="auth-link" data-i18n="login.signUpLink">Sign Up</a>
      </p>
    </section>
  </main>

  <script type="module" src="/src/login.ts"></script>
</body>
</html>
