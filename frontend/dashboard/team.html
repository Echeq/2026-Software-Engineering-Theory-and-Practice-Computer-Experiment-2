<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPMP | Team</title>
  <link rel="stylesheet" href="../css/dashboard.css">
  <script src="../js/i18n.js" defer></script>
</head>
<body>
  <div id="sidebar-backdrop" class="sidebar-backdrop" hidden data-close-sidebar="true"></div>

  <main class="dashboard-app">
    <aside id="dashboard-sidebar" class="dashboard-sidebar" aria-label="Primary navigation">
      <div class="sidebar-top">
        <div class="sidebar-brand-wrap">
          <a href="./index.html" class="sidebar-brand" aria-label="SPMP dashboard home">
            <span class="sidebar-logo">SP</span>
            <span class="sidebar-brand-copy">
              <strong>SPMP</strong>
              <span>Project workspace</span>
            </span>
          </a>
        </div>

        <nav class="sidebar-nav" aria-label="Workspace navigation">
          <a href="./index.html" class="sidebar-link">
            <svg class="nav-icon" viewBox="0 0 20 20" aria-hidden="true"><rect x="2.5" y="3" width="6" height="6" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.8"/><rect x="11.5" y="3" width="6" height="4" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.8"/><rect x="11.5" y="10" width="6" height="7" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.8"/><rect x="2.5" y="12" width="6" height="5" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.8"/></svg>
            <span>Dashboard</span>
          </a>
          <a href="./projects.html" class="sidebar-link">
            <svg class="nav-icon" viewBox="0 0 20 20" aria-hidden="true"><path d="M3 5.5a2 2 0 0 1 2-2h3.2l1.5 1.8H15a2 2 0 0 1 2 2v6.5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M3 7.3h14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            <span>Projects</span>
          </a>
          <a href="./tasks.html" class="sidebar-link">
            <svg class="nav-icon" viewBox="0 0 20 20" aria-hidden="true"><path d="M7.5 4h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H4.5a2 2 0 0 1-2-2V8.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M3.2 5.9 5.3 8l4-4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M9.5 8h5M9.5 12h5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            <span>Tasks</span>
          </a>
          <a href="./team.html" class="sidebar-link is-active">
            <svg class="nav-icon" viewBox="0 0 20 20" aria-hidden="true"><circle cx="6.2" cy="7" r="2.2" fill="none" stroke="currentColor" stroke-width="1.8"/><circle cx="13.8" cy="6.5" r="1.8" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M2.8 15.8c.5-2.4 2.4-4 4.7-4s4.2 1.6 4.7 4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M11.4 15.3c.3-1.8 1.8-3.1 3.6-3.1 1 0 1.9.3 2.7 1" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            <span>Team</span>
          </a>
          <a href="./settings.html" class="sidebar-link">
            <svg class="nav-icon" viewBox="0 0 20 20" aria-hidden="true"><path d="M4 5.5h12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M4 10h6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M4 14.5h12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><circle cx="13.5" cy="10" r="2.5" fill="none" stroke="currentColor" stroke-width="1.8"/></svg>
            <span>Settings</span>
          </a>
        </nav>
      </div>

      <div class="sidebar-footer">
        <div class="user-panel" aria-live="polite">
          <span id="user-avatar" class="user-avatar" aria-hidden="true">U</span>
          <strong id="user-name" class="user-display"></strong>
        </div>
        <button id="logout-btn" type="button" class="secondary-button sidebar-logout"><svg class="button-icon" viewBox="0 0 20 20" aria-hidden="true"><path d="M8 3.5H5.5a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2H8" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M11 6.5 15 10l-4 3.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M14.5 10H7" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg><span>Log Out</span></button>
      </div>
    </aside>

    <section class="dashboard-main" aria-labelledby="team-page-title">
      <header class="main-topbar">
        <div class="topbar-left">
          <button
            id="sidebar-toggle-btn"
            type="button"
            class="menu-toggle"
            aria-expanded="false"
            aria-controls="dashboard-sidebar"
            aria-label="Open navigation menu"
          >
            <span></span>
            <span></span>
            <span></span>
          </button>

          <div class="topbar-copy">
            <span class="section-tag">Team</span>
            <p class="topbar-label">Notifications, language controls, and workspace member access.</p>
          </div>
        </div>

        <div class="topbar-actions"></div>
      </header>

      <section class="overview-panel" aria-labelledby="team-page-title">
        <div class="overview-copy">
          <div class="page-title-row">
            <h1 id="team-page-title">Team</h1>
          </div>
          <p class="subtitle">All members of this workspace.</p>
        </div>
      </section>

      <section class="projects-section" aria-labelledby="team-members-title">
        <div class="section-header">
          <div class="section-copy">
            <span class="section-tag">Workspace</span>
            <h2 id="team-members-title">Team Members</h2>
            <p class="section-subtitle">People with access to this shared workspace.</p>
          </div>
        </div>

        <div id="team-members-list" class="team-members-list" aria-live="polite"></div>
      </section>
    </section>
  </main>

  <script>
    "use strict";

    const THEME_STORAGE_KEY = "dashboard-theme";
    const SETTINGS_STORAGE_KEY = "dashboard-settings-state";
    const MOBILE_SIDEBAR_BREAKPOINT = 960;

    const TEAM_MEMBERS = [
      { name: "Anna Ivanova", email: "anna.ivanova@example.com", role: "ADMIN", since: "March 12, 2026" },
      { name: "Daniel Wu", email: "daniel.wu@example.com", role: "MEMBER", since: "March 18, 2026" },
      { name: "Maya Patel", email: "maya.patel@example.com", role: "MEMBER", since: "April 03, 2026" },
      { name: "Lucas Meyer", email: "lucas.meyer@example.com", role: "MEMBER", since: "April 21, 2026" }
    ];

    let sidebarElement = null;
    let sidebarBackdropElement = null;
    let sidebarToggleButton = null;
    let logoutButton = null;
    let userNameElement = null;
    let userAvatarElement = null;
    let teamMembersListElement = null;

    document.addEventListener("DOMContentLoaded", initializeTeamPage);

    function initializeTeamPage() {
      cacheElements();
      applyTheme(readStoredTheme() || getPreferredTheme());
      syncSidebarState();
      setupEventListeners();
      renderCurrentUserPanel();
      renderTeamMembers();
    }

    function cacheElements() {
      sidebarElement = document.getElementById("dashboard-sidebar");
      sidebarBackdropElement = document.getElementById("sidebar-backdrop");
      sidebarToggleButton = document.getElementById("sidebar-toggle-btn");
      logoutButton = document.getElementById("logout-btn");
      userNameElement = document.getElementById("user-name");
      userAvatarElement = document.getElementById("user-avatar");
      teamMembersListElement = document.getElementById("team-members-list");
    }

    function setupEventListeners() {
      sidebarToggleButton?.addEventListener("click", toggleSidebar);
      sidebarBackdropElement?.addEventListener("click", closeSidebar);
      logoutButton?.addEventListener("click", logout);
      window.addEventListener("resize", syncSidebarState);
      document.querySelectorAll(".sidebar-link").forEach((link) => {
        link.addEventListener("click", () => {
          if (isMobileViewport()) {
            closeSidebar();
          }
        });
      });
    }

    function readStoredTheme() {
      const value = localStorage.getItem(THEME_STORAGE_KEY);
      return value === "dark" || value === "light" ? value : "";
    }

    function getPreferredTheme() {
      return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
    }

    function applyTheme(theme) {
      document.body.dataset.theme = theme;
    }

    function isMobileViewport() {
      return window.innerWidth <= MOBILE_SIDEBAR_BREAKPOINT;
    }

    function syncSidebarState() {
      if (!sidebarElement || !sidebarToggleButton || !sidebarBackdropElement) {
        return;
      }

      if (!isMobileViewport()) {
        document.body.classList.remove("sidebar-open");
      }

      const isOpen = !isMobileViewport() || document.body.classList.contains("sidebar-open");
      sidebarElement.setAttribute("aria-hidden", String(!isOpen));
      sidebarToggleButton.setAttribute("aria-expanded", String(isMobileViewport() && document.body.classList.contains("sidebar-open")));
      sidebarBackdropElement.hidden = !(isMobileViewport() && document.body.classList.contains("sidebar-open"));
    }

    function toggleSidebar() {
      if (!isMobileViewport()) {
        return;
      }
      document.body.classList.toggle("sidebar-open");
      syncSidebarState();
    }

    function closeSidebar() {
      document.body.classList.remove("sidebar-open");
      syncSidebarState();
    }

    function logout() {
      localStorage.removeItem("token");
      window.location.href = "../index.html";
    }

    function readStoredProfile() {
      try {
        const raw = localStorage.getItem(SETTINGS_STORAGE_KEY);
        if (!raw) {
          return { name: "", email: "" };
        }

        const parsed = JSON.parse(raw);
        return {
          name: typeof parsed?.profileName === "string" ? parsed.profileName.trim() : "",
          email: typeof parsed?.profileEmail === "string" ? parsed.profileEmail.trim() : ""
        };
      } catch (error) {
        console.warn("Failed to read stored profile:", error);
        return { name: "", email: "" };
      }
    }

    function getCurrentUser() {
      const storedProfile = readStoredProfile();
      return {
        name: storedProfile.name || "Anna Ivanova",
        email: storedProfile.email || "anna.ivanova@example.com"
      };
    }

    function renderCurrentUserPanel() {
      const currentUser = getCurrentUser();
      if (userNameElement) {
        userNameElement.textContent = currentUser.name;
      }
      if (userAvatarElement) {
        userAvatarElement.textContent = getInitials(currentUser.name);
      }
    }

    function renderTeamMembers() {
      if (!teamMembersListElement) {
        return;
      }

      const currentUser = getCurrentUser();
      const normalizedCurrentName = currentUser.name.trim().toLowerCase();
      const normalizedCurrentEmail = currentUser.email.trim().toLowerCase();

      const members = TEAM_MEMBERS.slice();
      const matchingMemberIndex = members.findIndex((member) => {
        return member.email.toLowerCase() === normalizedCurrentEmail || member.name.toLowerCase() === normalizedCurrentName;
      });

      if (matchingMemberIndex >= 0) {
        members[matchingMemberIndex] = {
          ...members[matchingMemberIndex],
          name: currentUser.name,
          email: currentUser.email
        };
      } else {
        members.unshift({
          name: currentUser.name,
          email: currentUser.email,
          role: "ADMIN",
          since: "March 12, 2026"
        });
      }

      teamMembersListElement.innerHTML = members.map((member) => {
        const isCurrentUser = member.email.toLowerCase() === normalizedCurrentEmail || member.name.toLowerCase() === normalizedCurrentName;
        return `
          <article class="team-member-card">
            <div class="team-member-main">
              <div class="team-member-heading">
                <h3 class="team-member-name">${escapeHtml(member.name)}${isCurrentUser ? ' <span class="team-you-label">(you)</span>' : ""}</h3>
                <span class="team-role-badge">${escapeHtml(member.role)}</span>
              </div>
              <div class="team-member-meta">
                <span class="team-email-badge">${escapeHtml(member.email)}</span>
                <p class="team-member-since">Member since ${escapeHtml(member.since)}</p>
              </div>
            </div>
          </article>
        `;
      }).join("");
    }

    function getInitials(name) {
      const parts = String(name)
        .trim()
        .split(/\s+/)
        .filter(Boolean)
        .slice(0, 2);

      if (!parts.length) {
        return "U";
      }

      return parts.map((part) => part.charAt(0).toUpperCase()).join("");
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }
  </script>

  <style>
    .team-members-list {
      display: grid;
      gap: 14px;
    }

    .team-member-card {
      border: 1px solid var(--surface-border);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.98);
      box-shadow: var(--shadow);
      padding: 20px 22px;
    }

    body[data-theme="dark"] .team-member-card {
      background: rgba(248, 250, 252, 0.98);
      border-color: rgba(203, 213, 225, 0.9);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.2);
      color: #1f2937;
    }

    .team-member-main {
      display: grid;
      gap: 14px;
    }

    .team-member-heading {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .team-member-name {
      font-size: 22px;
      line-height: 1.2;
      letter-spacing: -0.03em;
      color: #111827;
    }

    .team-you-label {
      color: var(--accent);
      font-size: 16px;
      font-weight: 700;
    }

    .team-role-badge,
    .team-email-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: fit-content;
      min-height: 32px;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .team-role-badge {
      border: 1px solid rgba(79, 70, 229, 0.16);
      background: rgba(79, 70, 229, 0.1);
      color: var(--accent);
    }

    .team-member-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .team-email-badge {
      border: 1px solid rgba(148, 163, 184, 0.28);
      background: #f8fafc;
      color: #334155;
      font-weight: 600;
      letter-spacing: 0;
    }

    .team-member-since {
      color: #475569;
      font-size: 14px;
      font-weight: 600;
    }

    @media (max-width: 720px) {
      .team-member-card {
        padding: 18px;
      }

      .team-member-name {
        font-size: 20px;
      }

      .team-member-meta {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</body>
</html>
