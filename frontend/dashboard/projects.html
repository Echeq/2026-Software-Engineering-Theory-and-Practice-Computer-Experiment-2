<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n-document-title="app.title.projects">SPMP | Projects</title>
  <link rel="stylesheet" href="../css/dashboard.css">
  <script src="../js/i18n.js" defer></script>
</head>
<body>
  <div id="sidebar-backdrop" class="sidebar-backdrop" hidden data-close-sidebar="true"></div>

  <main class="dashboard-app">
    <aside id="dashboard-sidebar" class="dashboard-sidebar" data-i18n-aria-label="app.aria.primaryNavigation" aria-label="Primary navigation">
      <div class="sidebar-top">
        <div class="sidebar-brand-wrap">
          <a href="./index.html" class="sidebar-brand" data-i18n-aria-label="app.aria.dashboardHome" aria-label="SPMP dashboard home">
            <span class="sidebar-logo">SP</span>
            <span class="sidebar-brand-copy">
              <strong>SPMP</strong>
              <span data-i18n="app.brand.workspace">Project workspace</span>
            </span>
          </a>
        </div>

        <nav class="sidebar-nav" data-i18n-aria-label="app.aria.workspaceNavigation" aria-label="Workspace navigation">
          <a href="./index.html" class="sidebar-link">
            <svg class="nav-icon" viewBox="0 0 20 20" aria-hidden="true"><rect x="2.5" y="3" width="6" height="6" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.8"/><rect x="11.5" y="3" width="6" height="4" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.8"/><rect x="11.5" y="10" width="6" height="7" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.8"/><rect x="2.5" y="12" width="6" height="5" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.8"/></svg>
            <span data-i18n="sidebar.dashboard">Dashboard</span>
          </a>
          <a href="./projects.html" class="sidebar-link is-active">
            <svg class="nav-icon" viewBox="0 0 20 20" aria-hidden="true"><path d="M3 5.5a2 2 0 0 1 2-2h3.2l1.5 1.8H15a2 2 0 0 1 2 2v6.5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M3 7.3h14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            <span data-i18n="sidebar.projects">Projects</span>
          </a>
          <a href="./tasks.html" class="sidebar-link">
            <svg class="nav-icon" viewBox="0 0 20 20" aria-hidden="true"><path d="M7.5 4h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H4.5a2 2 0 0 1-2-2V8.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M3.2 5.9 5.3 8l4-4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M9.5 8h5M9.5 12h5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            <span data-i18n="sidebar.tasks">Tasks</span>
          </a>
          <a href="./team.html" class="sidebar-link">
            <svg class="nav-icon" viewBox="0 0 20 20" aria-hidden="true"><circle cx="6.2" cy="7" r="2.2" fill="none" stroke="currentColor" stroke-width="1.8"/><circle cx="13.8" cy="6.5" r="1.8" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M2.8 15.8c.5-2.4 2.4-4 4.7-4s4.2 1.6 4.7 4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M11.4 15.3c.3-1.8 1.8-3.1 3.6-3.1 1 0 1.9.3 2.7 1" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            <span>Team</span>
          </a>
          <a href="./settings.html" class="sidebar-link">
            <svg class="nav-icon" viewBox="0 0 20 20" aria-hidden="true"><path d="M4 5.5h12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M4 10h6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M4 14.5h12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><circle cx="13.5" cy="10" r="2.5" fill="none" stroke="currentColor" stroke-width="1.8"/></svg>
            <span data-i18n="sidebar.settings">Settings</span>
          </a>
        </nav>
      </div>

      <div class="sidebar-footer">
        <div class="user-panel" aria-live="polite">
          <span id="user-avatar" class="user-avatar" aria-hidden="true">U</span>
          <strong id="user-name" class="user-display"></strong>
        </div>
        <button id="logout-btn" type="button" class="secondary-button sidebar-logout"><svg class="button-icon" viewBox="0 0 20 20" aria-hidden="true"><path d="M8 3.5H5.5a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2H8" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M11 6.5 15 10l-4 3.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M14.5 10H7" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg><span data-i18n="sidebar.logout">Log Out</span></button>
      </div>
    </aside>

    <section class="dashboard-main" aria-labelledby="projects-page-title">
      <header class="main-topbar">
        <div class="topbar-left">
          <button
            id="sidebar-toggle-btn"
            type="button"
            class="menu-toggle"
            aria-expanded="false"
            aria-controls="dashboard-sidebar"
            data-i18n-aria-label="app.aria.openNavigationMenu"
            aria-label="Open navigation menu"
          >
            <span></span>
            <span></span>
            <span></span>
          </button>

          <div class="topbar-copy">
            <span class="section-tag" data-i18n="projects.pageTag">Projects</span>
            <p class="topbar-label" data-i18n="projects.topbarLabel">Track your project pipeline across start-next, active, and completed work.</p>
          </div>
        </div>

        <div class="topbar-actions"></div>
      </header>

      <section class="overview-panel" aria-labelledby="projects-page-title">
        <div class="overview-copy">
          <div class="page-title-row">
            <h1 id="projects-page-title" data-i18n="projects.title">Projects Board</h1>
          </div>
        </div>
      </section>

      <section class="projects-section projects-board-section" aria-labelledby="projects-board-title">
        <div class="section-header">
          <div class="section-copy">
            <span class="section-tag" data-i18n="projects.kanbanTag">Board</span>
            <h2 id="projects-board-title" data-i18n="projects.flowTitle">Project Flow</h2>
            <p class="section-subtitle" data-i18n="projects.flowSubtitle">Drag projects across stages to update their status.</p>
          </div>

          <div class="projects-view-toggle" role="group" data-i18n-aria-label="app.aria.projectViewMode" aria-label="Project view mode">
            <button
              id="projects-view-grid-btn"
              type="button"
              class="settings-choice-button is-active"
              data-project-view="grid"
              aria-pressed="true"
              data-i18n="settings.viewGrid"
            >Grid</button>
            <button
              id="projects-view-list-btn"
              type="button"
              class="settings-choice-button"
              data-project-view="list"
              aria-pressed="false"
              data-i18n="settings.viewList"
            >List</button>
          </div>
        </div>

        <p class="form-message" id="projects-message" aria-live="polite"></p>

        <div id="projects-board" class="projects-grid projects-view-grid">
          <article class="state-card">
            <h3 data-i18n="dashboard.loadingTitle">Loading projects...</h3>
            <p data-i18n="projects.loadingText">Preparing your kanban board.</p>
          </article>
        </div>
      </section>
    </section>
  </main>

  <script src="../js/projects.js" defer></script>
</body>
</html>
